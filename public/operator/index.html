<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>IUCCS · 조종자 앱</title>
<style>
  :root{--bg:#0A111E;--surface:#152439;--surface2:#0b1626;--line:#24384F;--navy:#1F3A5F;
    --steel:#2E5A88;--ink:#EAF2FC;--text:#C4D4E7;--muted:#7C90A8;--amber:#E8A33D;--amberD:#C9871B;
    --red:#E24A3B;--yellow:#E1A800;--green:#2FA35A;--blue:#3B82D6;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-padding-bottom:calc(80px + env(safe-area-inset-bottom, 0px));background:var(--bg)}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    max-width:460px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
  .mono{font-family:"SF Mono",ui-monospace,Consolas,monospace}
  .ribbon{padding:9px 15px 8px;background:linear-gradient(180deg,#15243a,#111e31);border-bottom:1px solid var(--line);
    display:flex;flex-direction:column;gap:4px;position:sticky;top:0;z-index:10}
  .ribbon-top{display:flex;align-items:center;gap:9px}
  .ribbon .team{font-weight:800;color:var(--ink);font-size:16px}
  .ribbon-clk{font-size:11px;color:#AFC3DA;text-align:right;letter-spacing:.02em}
  .modeb{font-size:11px;font-weight:800;letter-spacing:.05em;padding:3px 9px;border-radius:6px}
  .mode-real{background:rgba(226,74,59,.16);color:#FF8579;border:1px solid rgba(226,74,59,.5)}
  .mode-sim{background:rgba(232,163,61,.16);color:#F3C070;border:1px solid rgba(232,163,61,.5)}
  main{flex:1;padding:14px 14px calc(96px + env(safe-area-inset-bottom, 0px));display:flex;flex-direction:column;gap:11px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 14px}
  .lbl{font-size:11px;letter-spacing:.12em;color:var(--muted);font-weight:700;margin-bottom:7px}
  .between{display:flex;align-items:center;justify-content:space-between}
  .drone-line{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .drone-line:last-of-type{border-bottom:none}
  .row{display:flex;align-items:center;gap:9px}
  .val{color:var(--ink);font-weight:700}
  .chip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px}
  .badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:6px}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  input,select{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:10px;
    color:var(--ink);padding:12px;font-size:15px;font-family:inherit}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:11px;
    padding:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
  .btn-amber{background:linear-gradient(180deg,var(--amber),var(--amberD));color:#1a1206}
  .btn-ghost{background:transparent;border:1px solid var(--steel);color:#CFE0F0}
  .seg{display:flex;background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px}
  .seg button{flex:1;border:none;background:transparent;color:var(--muted);font-weight:700;font-size:13.5px;
    padding:9px;border-radius:7px;cursor:pointer;font-family:inherit}
  .seg button.on{background:var(--navy);color:#fff}
  .chat-input-fixed{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom, 0px));left:50%;transform:translateX(-50%);
    width:100%;max-width:460px;z-index:35;background:var(--bg);padding:10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
    border-top:1px solid var(--line)}
  .status-chip{flex:1;border:1.5px solid;background:transparent;font-weight:800;font-size:11px;
    padding:9px 2px;border-radius:8px;cursor:pointer;font-family:inherit;transition:.15s}
  .stepper-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--surface2);color:var(--ink);
    font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;line-height:1;display:flex;align-items:center;justify-content:center;flex:none}
  .stepper-btn:active{background:var(--navy);border-color:var(--navy)}
  #mission_alert_banner{background:#8a2e22;color:#fff;font-size:12.5px;font-weight:700;text-align:center;
    padding:8px 10px;cursor:pointer;animation:missionBlink 1.1s ease-in-out infinite}
  @keyframes missionBlink{0%,100%{background:#8a2e22}50%{background:#c23f2c}}
  #chat_alert_banner{background:#1d5a8a;color:#fff;font-size:12.5px;font-weight:700;text-align:center;
    padding:8px 10px;cursor:pointer;animation:chatBlink 1.1s ease-in-out infinite}
  @keyframes chatBlink{0%,100%{background:#1d5a8a}50%{background:#2c7fc2}}
  .stepper-sm{width:26px;height:26px;font-size:15px}
  .numgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .numcell{background:var(--surface2);border:1px solid var(--line);border-radius:9px;padding:7px 8px}
  .numcell-label{font-size:11.5px;color:var(--muted);display:block;margin-bottom:5px}
  .tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;height:calc(64px + env(safe-area-inset-bottom, 0px));
    z-index:40;
    padding-bottom:env(safe-area-inset-bottom, 0px);
    border-top:1px solid var(--line);background:#0c182a;display:flex}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    color:var(--muted);font-size:9.5px;font-weight:700;border:none;background:none;cursor:pointer;font-family:inherit;padding:0 2px}
  .tab.on{color:var(--amber)}
  .tab .ic{font-size:17px}
  h2{color:var(--ink);font-size:16px;margin:2px 0 2px}
  .muted{color:var(--muted)}
  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:#16324b;border:1px solid var(--steel);
    color:#dff0ff;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;transition:.3s;z-index:30;pointer-events:none}
  .toast.show{opacity:1}
  @keyframes screenBlink{0%,100%{background-color:var(--bg)}50%{background-color:#3a1414}}
  body.alert-blink{animation:screenBlink .5s ease-in-out 6}
  .alert-popup{position:fixed;top:16px;left:50%;transform:translateX(-50%);width:min(360px,92vw);background:linear-gradient(180deg,#3a2a17,#2a1d10);
    border:1.5px solid var(--amber);color:#F3D26B;padding:12px 18px;border-radius:11px;font-size:13px;font-weight:700;
    z-index:90;box-shadow:0 12px 30px -8px rgba(0,0,0,.6);text-align:center;animation:alertPop .3s ease-out}
  @keyframes alertPop{0%{opacity:0;transform:translate(-50%,-12px)}100%{opacity:1;transform:translate(-50%,0)}}
  /* login */
  #login{flex:1;display:flex;flex-direction:column;justify-content:center;gap:16px;padding:24px 22px 40px}
  .logo{width:56px;height:56px;border-radius:15px;margin:0 auto 12px;background:linear-gradient(160deg,#2e5a88,#16273f);
    display:flex;align-items:center;justify-content:center;font-size:26px}
  .warn{background:rgba(232,163,61,.1);border:1px solid rgba(232,163,61,.35);color:#f3c882;
    font-size:12px;line-height:1.4;padding:9px 11px;border-radius:9px}
</style>

  .pickmap{height:200px;border-radius:11px;border:1px solid var(--line);margin-top:8px;background:#0b1626;z-index:1;position:relative}
  .minimap{height:180px;border-radius:12px;border:1px solid var(--line);margin:4px 0 2px;background:#0b1626;z-index:1;position:relative}

    width:34px;height:34px;border-radius:9px;font-size:16px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.45);padding:0}

  .geo{font-size:12px;color:var(--muted);margin-top:8px}

  .rcoords{font-size:12px;color:var(--text);margin-top:7px;line-height:1.6}

  .wp{background:transparent!important;border:none!important;box-shadow:none!important;color:#12222f;font-weight:800;font-size:11px;padding:0}

  .teamlabel{background:rgba(11,22,38,.88)!important;color:#fff!important;border:1px solid rgba(255,255,255,.18)!important;

  .teamlabel:before{display:none!important}
  .diamond-icon{background:transparent!important;border:none!important}

  @keyframes hostileBlink{0%,100%{opacity:1}50%{opacity:.32}}

  .friendly-icon{background:transparent!important;border:none!important}

  .leaflet-tooltip{background:#16273f;color:#dce8f5;border:1px solid #2e5a88;font-size:11.5px}
  .leaflet-popup-content-wrapper,.leaflet-popup-tip{background:#16273f;color:#dce8f5;border:1px solid #2e5a88}

  .leaflet-container{font-family:inherit;background:#0b1626}
  .leaflet-bar a{background:#16273f;color:#cfe0f0;border-color:#2e5a88}
  .leaflet-control-attribution{background:rgba(11,22,38,.7)!important;color:#6b7a8c!important}

</style>

<body>

<!-- ===== LOGIN ===== -->
<section id="login">
  <div style="text-align:center">
    <div class="logo">🛰️</div>
    <div style="color:var(--ink);font-weight:800;font-size:18px">통합무인전투 통제체계</div>

  </div>

<!-- ===== APP ===== -->
<div id="app" style="display:none;flex-direction:column;flex:1">
  <div class="ribbon">
    <div class="ribbon-top">
      <span class="team" id="rb_team">3팀</span>
      <span class="modeb" id="rb_mode">실제</span>
      <span class="chip" id="rb_role" style="background:rgba(59,130,214,.18);color:#8fc0ff">운용자</span>
      <button id="logoutbtn" onclick="doLogout()" title="로그아웃"
        style="background:none;border:none;color:var(--muted);padding:2px 0 2px 4px;cursor:pointer;line-height:1;margin-left:auto;display:flex;align-items:center">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10"/><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/></svg>

  <div id="chat_alert_banner" style="display:none" onclick="goToChatTab()"></div>
  <main id="view"></main>
  <nav class="tabs" id="tabs">
    <button class="tab on" data-v="home"><span class="ic">🏠</span>홈</button>
    <button class="tab" data-v="missions"><span class="ic">🎯</span>임무</button>
    <button class="tab" data-v="drones"><span class="ic">👥</span>팀관리</button>
    <button class="tab" data-v="report"><span class="ic">📋</span>보고</button>
    <button class="tab" data-v="alerts"><span class="ic">💬</span>대화</button>
  </nav>
</div>

<div id="alertPopup" class="alert-popup" style="display:none"><span id="alertPopupText"></span></div>
<div class="toast" id="toast"></div>

<script>
const API = location.pathname.replace(/\/public\/.*$/, '') + '/api';
let TOKEN=null, SESS={}, MODE='real';

// ---- helpers ----
async function api(path, method='GET', body=null){
  const h={'Content-Type':'application/json'};
  if(TOKEN) h['Authorization']='Bearer '+TOKEN;
  const r=await fetch(API+path,{method,headers:h,body:body?JSON.stringify(body):null});
  let d={}; try{d=await r.json()}catch(e){}
  if(!r.ok) throw d;
  return d;
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1900);}

// ---- notifications: popup + sound + screen blink ----
function playBeep(){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx) return;
    const ctx=new Ctx(); const o=ctx.createOscillator(); const g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.frequency.value=880; g.gain.value=0.18;
    o.start(); setTimeout(function(){ o.stop(); ctx.close(); },220);
  }catch(e){}
}
function blinkScreen(){
  document.body.classList.add('alert-blink');
  setTimeout(function(){ document.body.classList.remove('alert-blink'); },3000);
}
function alertPopup(msg){
  const el=document.getElementById('alertPopup'), t=document.getElementById('alertPopupText');
  if(!el||!t) return;
  t.textContent=msg; el.style.display='block';
  clearTimeout(el._hideTimer);
  el._hideTimer=setTimeout(function(){ el.style.display='none'; },4000);
}
let NOTIFY_PERM_ASKED=false;
function ensureNotifyPermission(){
  if(NOTIFY_PERM_ASKED) return; NOTIFY_PERM_ASKED=true;
  try{ if(window.Notification && Notification.permission==='default'){ Notification.requestPermission(); } }catch(e){}
}
function opNotify(msg){
  alertPopup(msg); playBeep(); blinkScreen();
  try{ if(window.Notification && Notification.permission==='granted'){ new Notification('IUCCS', {body:msg}); } }catch(e){}
}
let OP_FIRST_POLL=false, OP_SEEN_MAX_MISSION=0, OP_SEEN_MAX_MSG=0;
async function pollForNew(){
  try{
    const d=await api('/missions?team_id='+(SESS.team_id||''));
    const ms=d.missions||[];
    updateMissionAlertBanner(ms);
    if(ms.length){
      const maxId=Math.max.apply(null, ms.map(function(m){return m.id;}));
      if(OP_FIRST_POLL && maxId>OP_SEEN_MAX_MISSION){
        const newest=ms.reduce(function(a,b){return a.id>b.id?a:b;});
        opNotify('🎯 '+(MTYPE_LABELS[newest.type]||newest.type)+' 임무 하달됨');
      }
      OP_SEEN_MAX_MISSION=Math.max(OP_SEEN_MAX_MISSION,maxId);
    }
  }catch(e){}
  try{
    const d2=await api('/messages?peek=1');
    const msgs=d2.messages||[];
    updateChatAlertBanner(msgs);
    if(msgs.length){
      const maxId2=Math.max.apply(null, msgs.map(function(m){return m.id;}));
      if(OP_FIRST_POLL && maxId2>OP_SEEN_MAX_MSG){
        const newest2=msgs.reduce(function(a,b){return a.id>b.id?a:b;});
        if(newest2.direction==='to_team'){ opNotify('💬 관리자: '+newest2.body.slice(0,40)); }
      }
      OP_SEEN_MAX_MSG=Math.max(OP_SEEN_MAX_MSG,maxId2);
    }
  }catch(e){}
  OP_FIRST_POLL=true;
}
function updateMissionAlertBanner(missions){
  const el=document.getElementById('mission_alert_banner');
  if(!el) return;
  const unread=(missions||[]).filter(function(m){
    return (!m.response_type || m.response_type==='none') && m.status!=='completed' && m.status!=='cancelled';
  });
  if(unread.length){
    el.textContent='🎯 확인하지 않은 임무 '+unread.length+'건 — 탭하여 확인';
    el.style.display='block';
  }else{
    el.style.display='none';
  }
}
function updateChatAlertBanner(messages){
  const el=document.getElementById('chat_alert_banner');
  if(!el) return;
  const unread=(messages||[]).filter(function(m){ return m.direction==='to_team' && !m.read_at; });
  if(unread.length){
    el.textContent='💬 읽지 않은 대화 '+unread.length+'건 — 탭하여 확인';
    el.style.display='block';
  }else{
    el.style.display='none';
  }
}
function goToChatTab(){
  document.querySelectorAll('#tabs .tab').forEach(function(t){ t.classList.remove('on'); });
  const target=document.querySelector('#tabs .tab[data-v="alerts"]');
  if(target) target.classList.add('on');
  go('alerts');
}
function startNotifyPoll(){
  ensureNotifyPermission();
  pollForNew();
  setInterval(pollForNew, 10000);
}

const esc=s=>String(s??'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
function toMGRS(lat,lng){
  if(lat==null||lng==null||lat===''||lng===''||isNaN(+lat)||isNaN(+lng)) return null;
  try{ const s=mgrs.forward([+lng,+lat],5); const mt=s.match(/^(\d{1,2}[C-X])([A-Z]{2})(\d+)$/);
    if(mt){ const dd=mt[3], h=dd.length/2; return mt[1]+' '+mt[2]+' '+dd.slice(0,h)+' '+dd.slice(h); } return s;
  }catch(e){ return null; }
}
function coordText(lat,lng,fallback){ const m=toMGRS(lat,lng); return m||fallback||'-'; }
function mgrsPartsToLatLng(zb,sq,e,n){
  try{
    zb=(zb||'').trim().toUpperCase(); sq=(sq||'').trim().toUpperCase();
    e=(e||'').trim(); n=(n||'').trim();
    if(!zb||!sq||!e||!n) return null;
    e=e.padStart(5,'0').slice(0,5); n=n.padStart(5,'0').slice(0,5);
    const pt=mgrs.toPoint(zb+sq+e+n); // [lon,lat]
    if(!pt||isNaN(pt[0])||isNaN(pt[1])) return null;
    return [pt[1],pt[0]];
  }catch(err){ return null; }
}
function fillMgrsBoxes(lat,lng,prefix){
  const s=toMGRS(lat,lng); if(!s) return;
  const parts=s.split(' '); if(parts.length!==4) return;
  const z=document.getElementById(prefix+'_zone'), sq=document.getElementById(prefix+'_sq'),
        e=document.getElementById(prefix+'_e'), n=document.getElementById(prefix+'_n');
  if(z)z.value=parts[0]; if(sq)sq.value=parts[1]; if(e)e.value=parts[2]; if(n)n.value=parts[3];
}
function toggleMgrsManual(prefix){
  const wrap=document.getElementById(prefix+'_mgrs_wrap');
  const btn=document.getElementById(prefix+'_mgrs_toggle');
  if(!wrap) return;
  const open=wrap.style.display!=='none';
  wrap.style.display=open?'none':'block';
  if(btn) btn.textContent=(open?'▸':'▾')+' 군사좌표 수동입력';
}
const TEAMPAL=['#56B4E9','#E69F00','#009E73','#CC79A7','#D55E00','#0072B2','#B0BEC5','#F0E442'];
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000, toRad=function(d){return d*Math.PI/180;};
  const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ---- position reporting (auto every N minutes, or every N meters moved) ----
function loadReportSettings(){
  try{
    const raw=localStorage.getItem('iuccs_report_settings');
    if(raw) return Object.assign({enabled:true,mode:'time',minutes:5,meters:200,lastAt:null}, JSON.parse(raw));
  }catch(e){}
  return {enabled:true,mode:'time',minutes:5,meters:200,lastAt:null};
}
function persistReportSettings(){
  try{ localStorage.setItem('iuccs_report_settings', JSON.stringify(REPORT_SETTINGS)); }catch(e){}
}
let REPORT_SETTINGS=loadReportSettings();
let REPORT_TIMER=null, REPORT_WATCH=null, LAST_REPORT_POS=null;
function saveReportSettings(){
  const enabled=document.getElementById('rs_enabled').checked;
  const mode=document.querySelector('#rs_mode button.on')?document.querySelector('#rs_mode button.on').dataset.m:'time';
  const minutes=Math.max(1,+document.getElementById('rs_minutes').value||5);
  const meters=Math.max(10,+document.getElementById('rs_meters').value||200);
  REPORT_SETTINGS=Object.assign({},REPORT_SETTINGS,{enabled,mode,minutes,meters});
  persistReportSettings();
  toast('위치 보고 설정 저장됨');
  startAutoReport();
}
function stopAutoReport(){
  if(REPORT_TIMER){ clearInterval(REPORT_TIMER); REPORT_TIMER=null; }
  if(REPORT_WATCH!=null && navigator.geolocation){ navigator.geolocation.clearWatch(REPORT_WATCH); REPORT_WATCH=null; }
}
function startAutoReport(){
  stopAutoReport();
  if(!REPORT_SETTINGS.enabled || !navigator.geolocation) return;
  // report once immediately on connect
  sendPositionReport('auto');
  if(REPORT_SETTINGS.mode==='distance'){
    REPORT_WATCH=navigator.geolocation.watchPosition(function(pos){
      const la=pos.coords.latitude, ln=pos.coords.longitude;
      if(!LAST_REPORT_POS || haversine(LAST_REPORT_POS[0],LAST_REPORT_POS[1],la,ln) >= REPORT_SETTINGS.meters){
        submitPosition(la,ln,'auto');
      }
    }, function(){ /* geolocation error — silently skip */ }, {enableHighAccuracy:false, maximumAge:60000});
  } else {
    REPORT_TIMER=setInterval(function(){ sendPositionReport('auto'); }, REPORT_SETTINGS.minutes*60*1000);
  }
}
function sendPositionReport(source){
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(function(pos){
    submitPosition(pos.coords.latitude, pos.coords.longitude, source);
  }, function(){ /* permission denied or unavailable — silently skip */ }, {enableHighAccuracy:false, maximumAge:60000});
}
async function submitPosition(lat,lng,source){
  try{
    await api('/team-track','POST',{lat,lng,source});
    LAST_REPORT_POS=[lat,lng];
    if(source==='auto'){
      REPORT_SETTINGS.lastAt=new Date().toTimeString().slice(0,8);
      persistReportSettings();
      const el=document.getElementById('rs_last'); if(el) el.textContent='마지막 자동보고: '+REPORT_SETTINGS.lastAt;
    }
  }catch(e){}
}
function manualPositionReport(){
  if(!navigator.geolocation){ toast('위치 정보를 사용할 수 없습니다'); return; }
  navigator.geolocation.getCurrentPosition(function(pos){
    submitPosition(pos.coords.latitude,pos.coords.longitude,'manual');

  }, function(){ toast('위치 권한이 거부되었거나 가져올 수 없습니다'); }, {enableHighAccuracy:false, maximumAge:0});
}

const TCOL={unavailable:'#E24A3B',preparing:'#E1A800',ready:'#2FA35A',on_mission:'#3B82D6'};
const OP_MAP_STYLES={
  dark:{icon:'🌙', url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', opts:{subdomains:'abcd', attribution:'&copy; OSM &copy; CARTO'}},
  topo:{icon:'🗺', url:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', opts:{subdomains:'abc', attribution:'&copy; OpenTopoMap contributors'}},
  sat:{icon:'🛰', url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', opts:{attribution:'Esri, Maxar, Earthstar Geographics'}},
};
const OP_STYLE_ORDER=['sat','dark','topo'];
function getSavedOpStyle(){
  try{ const s=localStorage.getItem('iuccs_op_map_style'); if(OP_MAP_STYLES[s]) return s; }catch(e){}
  return 'sat';
}
function darkTiles(map){
  const style=getSavedOpStyle();
  const st=OP_MAP_STYLES[style];
  const layer=L.tileLayer(st.url, Object.assign({maxZoom:19}, st.opts)).addTo(map);
  map._opBaseLayer=layer; map._opStyle=style;
}
function addStyleToggleBtn(map, containerId){
  const container=document.getElementById(containerId);
  if(!container||typeof L==='undefined') return;
  const btn=document.createElement('button');
  btn.type='button'; btn.className='locate-btn'; btn.style.top='10px'; btn.style.left='10px'; btn.style.right='auto';
  btn.title='지도 스타일 전환';
  btn.innerHTML=OP_MAP_STYLES[map._opStyle||getSavedOpStyle()].icon;
  L.DomEvent.disableClickPropagation(btn);
  btn.onclick=function(){
    const cur=map._opStyle||getSavedOpStyle();
    const next=OP_STYLE_ORDER[(OP_STYLE_ORDER.indexOf(cur)+1)%OP_STYLE_ORDER.length];
    if(map._opBaseLayer) map.removeLayer(map._opBaseLayer);
    const st=OP_MAP_STYLES[next];
    map._opBaseLayer=L.tileLayer(st.url, Object.assign({maxZoom:19}, st.opts)).addTo(map);
    map._opStyle=next;
    btn.innerHTML=st.icon;
    try{ localStorage.setItem('iuccs_op_map_style', next); }catch(e){}
  };
  container.appendChild(btn);
}
function addLocateBtn(map, containerId, onFound){
  const container=document.getElementById(containerId);
  if(!container||typeof L==='undefined') return;
  const btn=document.createElement('button');
  btn.type='button'; btn.className='locate-btn'; btn.title='현재 위치로 이동'; btn.innerHTML='📍';
  L.DomEvent.disableClickPropagation(btn);
  let accCircle=null;
  btn.onclick=function(){
    if(!navigator.geolocation){ toast('위치 정보를 사용할 수 없습니다'); return; }
    btn.disabled=true; btn.innerHTML='⏳';
    navigator.geolocation.getCurrentPosition(function(pos){
      const la=pos.coords.latitude, ln=pos.coords.longitude, acc=pos.coords.accuracy;
      map.setView([la,ln], Math.max(map.getZoom(),15));
      if(acc){
        if(accCircle) map.removeLayer(accCircle);
        accCircle=L.circle([la,ln],{radius:acc,color:'#3B82D6',weight:1.5,fillColor:'#3B82D6',fillOpacity:.12}).addTo(map);
      }
      if(onFound) onFound(la,ln);
      btn.disabled=false; btn.innerHTML='📍';
    }, function(err){
      const msgs={1:'위치 권한이 거부되었습니다 — 브라우저/기기 설정에서 위치 접근을 허용해 주세요.',
        2:'위치를 확인할 수 없습니다 — GPS 신호가 약하거나 실내일 수 있습니다.',
        3:'위치 확인 시간이 초과되었습니다 — 하늘이 보이는 곳에서 다시 시도해 주세요.'};
      toast(msgs[err.code]||'위치를 가져올 수 없습니다');
      btn.disabled=false; btn.innerHTML='📍';
    },
    {enableHighAccuracy:true, maximumAge:30000, timeout:20000});
  };
  container.appendChild(btn);
}
function mountPicker(elId,onSet){
  if(typeof L==='undefined')return null;
  const map=L.map(elId,{zoomControl:true}).setView([37.555,127.01],13);
  darkTiles(map); let marker=null;
  function place(la,ln){
    if(marker)marker.setLatLng([la,ln]); else marker=L.circleMarker([la,ln],{radius:8,color:'#0b1626',weight:2,fillColor:'#E8A33D',fillOpacity:.95}).addTo(map);
    map.panTo([la,ln]);
  }
  map.on('click',function(e){
    const la=e.latlng.lat, ln=e.latlng.lng;
    place(la,ln);
    onSet(la,ln);
  });
  setTimeout(function(){map.invalidateSize();},250);
  addLocateBtn(map, elId, function(la,ln){ place(la,ln); onSet(la,ln); });
  addStyleToggleBtn(map, elId);
  return {map:map, place:place};
}
function diamondIcon(blink){ return L.divIcon({className:'diamond-icon',html:'<div class="diamond'+(blink?' blinking':'')+'"></div>',iconSize:[20,20],iconAnchor:[10,10]}); }

async function homeMap(){

      const info = r.kind==='recon' ? reconTargetSummary(r) : (r.note||'');
      const at=r.action_taken||'none';
      let m, tip;
      if(r.hostile==1 && at==='friendly'){
        m=L.marker([+r.lat,+r.lng],{icon:friendlySquareIcon()});
        tip='<b>'+esc(teamNo)+'팀 보고</b> · <span style="color:#6fe0a0">■ 아군 확인</span><br>'+esc(info);
      } else if(r.hostile==1){
        m=L.marker([+r.lat,+r.lng],{icon:diamondIcon(at==='none')});
        tip='<b>'+esc(teamNo)+'팀 보고</b> · <span style="color:#ff8579">🔺적 식별</span><br>'+esc(info);
      } else {
        m=L.circleMarker([+r.lat,+r.lng],{radius:5,weight:2,color:'#0b1626',fillColor:'#E8A33D',fillOpacity:.95});
        tip='<b>'+esc(teamNo)+'팀 보고</b><br>'+esc(info);
      }
      m.bindTooltip(tip,{direction:'top',sticky:true}).addTo(map);
      pts.push([+r.lat,+r.lng]);
    });
    (d.fire_requests||[]).forEach(function(f){
      const teamNo=teamNoOf[f.team_id]||f.team_id;
      L.circleMarker([+f.lat,+f.lng],{radius:6,weight:2,color:'#0b1626',fillColor:'#ff5b5b',fillOpacity:.95})
        .bindTooltip('<b>'+esc(teamNo)+'팀 화력요청</b><br>'+esc(f.target||''),{direction:'top',sticky:true}).addTo(map);
      pts.push([+f.lat,+f.lng]);
    });
    if(pts.length)map.fitBounds(pts,{padding:[28,28],maxZoom:14});
  }catch(e){}
  setTimeout(function(){map.invalidateSize();},250);
}

        <input id="nm_name" placeholder="이름" style="margin-bottom:8px">
        <select id="nm_role" style="margin-bottom:8px">${ROLES.map(r=>`<option value="${r}">${r}</option>`).join('')}</select>
        <button class="btn btn-ghost" style="padding:9px" onclick="addMember()">+ 팀원 추가</button>
      </div>`;
    renderMemberList(members);

function modelOptions(selId){
  const groups={attack:[],recon:[]};
  DRONE_MODELS.forEach(function(m){ (groups[m.category]||groups.attack).push(m); });
  let html='';
  ['attack','recon'].forEach(function(cat){
    if(!groups[cat].length) return;
    html += `<optgroup label="${CATLBL[cat]}">` + groups[cat].map(function(m){
      return `<option value="${m.id}" ${(''+selId)===(''+m.id)?'selected':''}>${esc(m.name)}</option>`;
    }).join('') + `</optgroup>`;
  });
  return html;
}
function renderMemberList(members){
  const el=document.getElementById('memberlist');
  if(!el) return;
  el.innerHTML = members.length ? members.map(function(m){
    if(EDITING_MEMBER===m.id){
      return `<div class="card" style="padding:9px 10px">
        <input id="edit_name_${m.id}" value="${esc(m.name)}" style="margin-bottom:6px">
        <select id="edit_role_${m.id}" style="margin-bottom:6px">${ROLES.map(function(r){return `<option value="${r}" ${r===m.role?'selected':''}>${r}</option>`;}).join('')}</select>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost" style="flex:1;padding:6px;font-size:11px" onclick="cancelEditMember()">취소</button>
          <button class="btn btn-amber" style="flex:1;padding:6px;font-size:11px" onclick="saveEditMember(${m.id})">저장</button>
        </div></div>`;
    }
    return `<div class="card between" style="padding:8px 10px">
      <span style="font-size:13px">${esc(m.name)} <span class="chip" style="background:var(--surface2);color:var(--text);margin-left:4px">${esc(m.role)}</span></span>
      <span style="display:flex;gap:5px">
        <button class="btn btn-ghost" style="padding:3px 8px;font-size:10.5px" onclick="startEditMember(${m.id})">수정</button>
        <button class="btn btn-ghost" style="padding:3px 8px;font-size:10.5px" onclick="deleteMember(${m.id})">삭제</button>
      </span></div>`;
  }).join('') : '<div class="card muted">등록된 팀원이 없습니다.</div>';
}
function startEditMember(id){ EDITING_MEMBER=id; renderDrones(); }
function cancelEditMember(){ EDITING_MEMBER=null; renderDrones(); }
async function saveEditMember(id){
  const name=document.getElementById('edit_name_'+id).value.trim();
  const role=document.getElementById('edit_role_'+id).value;
  if(!name){ toast('이름을 입력하세요'); return; }
  try{ await api('/team-members/update','POST',{id,name,role}); EDITING_MEMBER=null; toast('수정됨'); renderDrones(); }
  catch(e){ toast('수정 실패'); }
}
async function deleteMember(id){
  if(!confirm('이 팀원을 삭제하시겠습니까?')) return;
  try{ await api('/team-members/delete','POST',{id}); toast('삭제됨'); renderDrones(); }catch(e){ toast('삭제 실패'); }
}
async function addMember(){
  const name=document.getElementById('nm_name').value.trim();
  const role=document.getElementById('nm_role').value;
  if(!name){ toast('이름을 입력하세요'); return; }
  try{ await api('/team-members/create','POST',{team_id:SESS.team_id,name,role}); toast('팀원 추가됨'); renderDrones(); }
  catch(e){ toast('추가 실패'); }
}
function droneCard(dr){
  const catColor = dr.model_category==='attack' ? 'rgba(226,74,59,.16);color:#ff8579' : (dr.model_category==='recon' ? 'rgba(59,130,214,.16);color:#8fc0ff' : 'rgba(124,144,168,.16);color:var(--muted)');
  return `<div class="card" id="dc_${dr.id}">
    <div class="between" style="margin-bottom:9px">
      <span id="dr_catbadge_${dr.id}" class="chip" style="background:${catColor}">${dr.model_category?CATLBL[dr.model_category]:'미지정'}</span>
      <input id="dr_code_${dr.id}" value="${esc(dr.code)}" placeholder="호수 (예: 1호수)" style="width:130px;text-align:right;font-weight:700;color:var(--ink)">
    </div>
    <div class="lbl">장비명</div>
    <select id="dr_model_${dr.id}" style="margin-bottom:9px" onchange="updateDroneCatBadge(${dr.id}, this.value)">${modelOptions(dr.model_id)}</select>
    <div class="lbl">운용 가능상태</div>
    <select id="dr_stat_${dr.id}" style="margin-bottom:9px">
      <option value="available" ${dr.status==='available'?'selected':''}>가용</option>
      <option value="maintenance" ${dr.status==='maintenance'?'selected':''}>정비</option>
      <option value="destroyed" ${dr.status==='destroyed'?'selected':''}>파괴</option>
    </select>
    <div class="lbl">비고 (특이사항)</div>
    <input id="dr_note_${dr.id}" value="${esc(dr.note||'')}" placeholder="예: 프로펠러 교체 필요" style="margin-bottom:10px">
    <div style="display:flex;gap:6px">
      <button class="btn btn-amber" style="padding:10px;flex:1" onclick="saveDrone(${dr.id})">저장</button>
      <button class="btn btn-ghost" style="padding:10px;flex:1" onclick="deleteDrone(${dr.id})">삭제</button>
    </div>
  </div>`;
}
function updateDroneCatBadge(id, modelId){
  const badge=document.getElementById('dr_catbadge_'+id);
  if(!badge) return;
  const mo=DRONE_MODELS.find(function(m){ return (''+m.id)===(''+modelId); });
  const cat=mo?mo.category:null;
  badge.textContent=cat?CATLBL[cat]:'미지정';
  badge.style.background=cat==='attack'?'rgba(226,74,59,.16)':(cat==='recon'?'rgba(59,130,214,.16)':'rgba(124,144,168,.16)');
  badge.style.color=cat==='attack'?'#ff8579':(cat==='recon'?'#8fc0ff':'var(--muted)');
}
async function deleteDrone(id){
  if(!confirm('이 기체를 삭제하시겠습니까? 되돌릴 수 없습니다.')) return;
  try{ await api('/drones/delete','POST',{id}); toast('기체 삭제됨'); renderDrones(); }
  catch(e){ toast('삭제 실패'); }
}
async function saveDrone(id){
  const g=k=>document.getElementById(k+'_'+id).value;
  try{
    await api('/drones/update','POST',{id,code:g('dr_code'),model_id:+g('dr_model')||null,status:g('dr_stat'),note:g('dr_note')});
    toast('기체 정보 저장됨'); renderDrones();
  }catch(e){ toast(e.error==='duplicate_or_invalid'?'저장 실패 (중복된 호수)':'저장 실패'); }
}
async function createDrone(){
  const code=document.getElementById('nd_code').value.trim();
  const modelId=+document.getElementById('nd_model').value||null;
  if(!code){ toast('기체 코드를 입력하세요'); return; }
  try{
    await api('/drones/create','POST',{team_id:SESS.team_id,code,model_id:modelId});
    toast('기체 추가됨'); renderDrones();
  }catch(e){ toast('추가 실패 (중복 코드일 수 있음)'); }
}

// ---- MISSIONS ----
function completeWidget(m){
  if(m.status==='completed') return `<div class="geo" style="margin-top:9px;color:#6fe0a0">✔ 임무 완료 보고됨${m.completion_note?' — '+esc(m.completion_note):''}</div>`;
  if(m.status==='cancelled') return '';
  return `
    <div id="cbtn_${m.id}" style="margin-top:9px">
      <button class="btn btn-ghost" style="padding:9px;font-size:12.5px" onclick="showCompleteForm(${m.id})">✅ 임무 완료 보고</button>
    </div>
    <div id="cform_${m.id}" style="display:none;margin-top:9px">
      <input id="cf_note_${m.id}" placeholder="완료 내용 (선택)" style="margin-bottom:7px">
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost" style="padding:9px;font-size:12px;flex:1" onclick="cancelCompleteForm(${m.id})">취소</button>
        <button class="btn btn-amber" style="padding:9px;font-size:12px;flex:1" onclick="completeMission(${m.id})">완료 전송</button>
      </div>
    </div>`;
}
function showCompleteForm(id){
  const b=document.getElementById('cbtn_'+id); if(b) b.style.display='none';
  const f=document.getElementById('cform_'+id); if(f) f.style.display='block';
}
function cancelCompleteForm(id){
  const b=document.getElementById('cbtn_'+id); if(b) b.style.display='block';
  const f=document.getElementById('cform_'+id); if(f) f.style.display='none';
}
async function completeMission(id){
  const e=document.getElementById('cf_note_'+id);
  try{ await api('/missions/complete','POST',{id,note:e?e.value:''}); toast('임무 완료 보고됨'); renderMissions(); }catch(err){ toast('전송 실패'); }
}
function respWidget(m){
  if(m.status==='cancelled') return `<div class="geo" style="margin-top:9px;color:var(--muted)">🚫 이 임무는 취소되었습니다. 별도 조치가 필요 없습니다.</div>`;
  const t=m.response_type;
  if(t==='ack') return `<div class="geo" style="margin-top:9px"><span class="mono" style="color:#6fe0a0">✔ 수신확인 완료</span>${m.response_start_time?' · '+esc(m.response_start_time)+'부터 임무 시작':''}</div>`;
  if(t==='unable') return `<div class="geo" style="margin-top:9px;color:#ff8579">✖ 임무불가${m.response_reason?' (사유: '+esc(m.response_reason)+')':''}</div>`;
  if(t==='delay') return `<div class="geo" style="margin-top:9px;color:var(--amber)">⏱ 준비시간 : ${m.response_delay_min||0}분${m.response_reason?' (사유: '+esc(m.response_reason)+')':''}</div>`;
  return `
    <div id="respbtns_${m.id}" style="display:flex;gap:6px;margin-top:9px">
      <button class="btn btn-ghost" style="padding:9px;font-size:12px;flex:1" onclick="showRespForm(${m.id},'ack')">✔ 수신확인</button>
      <button class="btn btn-ghost" style="padding:9px;font-size:12px;flex:1" onclick="showRespForm(${m.id},'unable')">✖ 임무불가</button>
      <button class="btn btn-ghost" style="padding:9px;font-size:12px;flex:1" onclick="showRespForm(${m.id},'delay')">⏱ 준비필요</button>
    </div>
    <div id="respform_ack_${m.id}" style="display:none;margin-top:9px">
      <div class="lbl" style="margin-bottom:6px">임무 시작 시간</div>
      <div style="display:flex;gap:5px;margin-bottom:7px">
        <button type="button" class="btn btn-ghost" style="flex:1;padding:7px;font-size:11px" onclick="quickSetAckTime(${m.id},0)">지금</button>
        <button type="button" class="btn btn-ghost" style="flex:1;padding:7px;font-size:11px" onclick="quickSetAckTime(${m.id},5)">5분뒤</button>
        <button type="button" class="btn btn-ghost" style="flex:1;padding:7px;font-size:11px" onclick="quickSetAckTime(${m.id},10)">10분뒤</button>
        <button type="button" class="btn btn-ghost" style="flex:1;padding:7px;font-size:11px" onclick="quickSetAckTime(${m.id},30)">30분뒤</button>
      </div>
      <input id="ack_time_${m.id}" type="time" style="margin-bottom:7px">
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost" style="padding:9px;font-size:12px;flex:1" onclick="cancelRespForm(${m.id})">취소</button>
        <button class="btn btn-amber" style="padding:9px;font-size:12px;flex:1" onclick="respondMission(${m.id},'ack')">전송</button>
      </div>
    </div>
    <div id="respform_unable_${m.id}" style="display:none;margin-top:9px">
      <input id="un_reason_${m.id}" placeholder="임무불가 사유" style="margin-bottom:7px">
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost" style="padding:9px;font-size:12px;flex:1" onclick="cancelRespForm(${m.id})">취소</button>
        <button class="btn btn-amber" style="padding:9px;font-size:12px;flex:1" onclick="respondMission(${m.id},'unable')">전송</button>
      </div>
    </div>
    <div id="respform_delay_${m.id}" style="display:none;margin-top:9px">
      <input id="dl_min_${m.id}" type="number" placeholder="준비 시간(분)" style="margin-bottom:7px">
      <input id="dl_reason_${m.id}" placeholder="사유" style="margin-bottom:7px">
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost" style="padding:9px;font-size:12px;flex:1" onclick="cancelRespForm(${m.id})">취소</button>
        <button class="btn btn-amber" style="padding:9px;font-size:12px;flex:1" onclick="respondMission(${m.id},'delay')">전송</button>
      </div>
    </div>`;
}
function fmtHM(d){ return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function quickSetAckTime(id, minutes){
  const d=new Date(Date.now()+minutes*60000);
  const el=document.getElementById('ack_time_'+id);
  if(el) el.value=fmtHM(d);
}
function showRespForm(id,type){
  const b=document.getElementById('respbtns_'+id); if(b) b.style.display='none';
  const f=document.getElementById('respform_'+type+'_'+id); if(f) f.style.display='block';
  if(type==='ack'){ quickSetAckTime(id,0); }
}
function cancelRespForm(id){
  const b=document.getElementById('respbtns_'+id); if(b) b.style.display='flex';
  ['ack','unable','delay'].forEach(function(t){ const f=document.getElementById('respform_'+t+'_'+id); if(f) f.style.display='none'; });
}
async function respondMission(id,type){
  const body={id,response:type};
  if(type==='ack'){ const e=document.getElementById('ack_time_'+id); body.start_time=e?e.value:''; }
  if(type==='unable'){ const e=document.getElementById('un_reason_'+id); body.reason=e?e.value:''; }
  if(type==='delay'){
    const em=document.getElementById('dl_min_'+id), er=document.getElementById('dl_reason_'+id);
    body.delay_min=em&&em.value?+em.value:null; body.reason=er?er.value:'';
  }
  try{ await api('/missions/respond','POST',body); toast('응답 전송됨'); renderMissions(); }catch(e){ toast('전송 실패'); }
}
async function renderMissions(){
  const v=document.getElementById('view'); v.innerHTML='<div class="muted">불러오는 중…</div>';
  try{
    const d=await api('/missions?team_id='+(SESS.team_id||''));
    const ms=d.missions||[];
    if(!ms.length){ v.innerHTML='<div class="card muted">수신된 임무가 없습니다.</div>'; return; }
    const routes={};
    const MTYPE_BADGE={recon:'rgba(59,130,214,.18);color:#8fc0ff',attack:'rgba(226,74,59,.18);color:#ff8579',damage:'rgba(232,163,61,.18);color:#F3C070'};
    v.innerHTML=ms.map(m=>{
      const atk=m.type==='attack';
      const singlePoint = m.type==='attack' || m.type==='damage';
      let pts=null; if(m.route_points){ try{ pts=JSON.parse(m.route_points); }catch(e){} }
      if(pts&&pts.length) routes[m.id]=pts;
      const gate=atk&&!(m.approved==1)?`<div class="warn" style="margin:9px 0">⚠ 지휘관 승인·교전규칙(ROE) 확인 후 수행 가능</div>`:'';
      const respBlock=respWidget(m);
      const canResultReport = m.response_type==='ack' && m.status!=='cancelled';
      const hasReported = (+m.report_count>0) || m.status==='completed';
      const resultReportBlock = canResultReport
        ? `<button class="btn btn-ghost" style="padding:9px;font-size:12.5px;width:100%;margin-top:9px" onclick="goToResultReport(${m.id},'${m.type}',${m.lat==null?'null':+m.lat},${m.lng==null?'null':+m.lng})">📋 ${hasReported?'결과 추가보고':'결과보고'}</button>`
        : '';
      const completeBlock=completeWidget(m);
      const statusChip = m.status==='completed'
        ? '<span class="chip" style="background:rgba(124,144,168,.18);color:#AEB9C6">✔ 완료</span>'
        : (m.status==='cancelled'
          ? '<span class="chip" style="background:rgba(124,144,168,.16);color:var(--muted)">취소됨</span>'
          : `<span class="chip" style="background:rgba(232,163,61,.14);color:var(--amber)">${MSTAT[m.status]||m.status}</span>`);
      const mapBlock=(pts&&pts.length)?`
        <div class="lbl" style="margin:11px 0 0">${singlePoint?'표적 위치':'경로 ('+pts.length+'개 지점)'}</div>
        <div id="mmap_${m.id}" class="pickmap" style="height:180px"></div>
        <div class="rcoords">${pts.map((p,i)=>'<div>'+(i+1)+') <span class="mono">'+esc(toMGRS(p[0],p[1])||'')+'</span></div>').join('')}</div>`:'';
      const cardStyle = m.status==='completed'
        ? 'filter:grayscale(0.85);opacity:.6;'
        : (atk?'border-color:rgba(232,163,61,.45);':'');
      return `<div class="card" ${cardStyle?`style="${cardStyle}"`:''}>
        <div class="between" style="margin-bottom:8px">
          <span class="badge" style="background:${MTYPE_BADGE[m.type]||MTYPE_BADGE.recon}">${MTYPE_LABELS[m.type]||m.type}</span>
          ${statusChip}</div>
        <div class="between" style="font-size:13px;padding:3px 0"><span class="muted">위치</span><span class="mono" style="color:#CFE0F0">${esc(coordText(m.lat,m.lng,m.coord))}</span></div>
        <div class="between" style="font-size:13px;padding:3px 0"><span class="muted">${singlePoint?'방식':'경로'}</span><span class="val" style="font-size:13px">${esc(singlePoint?(m.method||'표적지정'):(m.route||'-'))}</span></div>
        ${mapBlock}${gate}${respBlock}${resultReportBlock}${completeBlock}</div>`;}).join('');
    Object.keys(routes).forEach(function(id){ mountRouteMap('mmap_'+id, routes[id]); });
  }catch(e){ v.innerHTML=err(e); }
}
function mountRouteMap(elId,pts){
  if(typeof L==='undefined'||!document.getElementById(elId))return;
  const map=L.map(elId,{zoomControl:true}).setView(pts[0],14);
  darkTiles(map);
  const color=teamColorForNo(SESS.team_no);
  if(pts.length>1) L.polyline(pts,{color:color,weight:3,dashArray:'6,7'}).addTo(map);
  pts.forEach(function(p,i){
    L.circleMarker(p,{radius:8,color:'#0b1626',weight:2,fillColor:color,fillOpacity:.95})

const RECON_FIELD_LABELS=[['troops','병력'],['trucks','트럭'],['vehicles','차량'],['tanks','전차'],['armored','장갑차'],['artillery','포병'],['mortar','박격포'],['command_post','지휘소']];
const DIRECTION_OPTS=['북','북동','동','남동','남','남서','서','북서'];
const ACTIVITY_LABELS={moving:'이동중',defending:'방어중',attacking:'공격중'};
function reconTargetSummary(r){
  if(r.unidentified==1) return '❓ 미식별 (식별된 것 없음)';
  const parts=RECON_FIELD_LABELS.filter(function(l){ return r[l[0]]!=null && +r[l[0]]>0; }).map(function(l){ return l[1]+' '+r[l[0]]; });
  let s = parts.length ? parts.join(' · ') : '식별된 표적 없음';
  if(r.activity){
    s += ' · '+(ACTIVITY_LABELS[r.activity]||r.activity);
    if((r.activity==='moving'||r.activity==='attacking') && r.direction){ s += '('+r.direction+')'; }
  }
  return s;
}
const DAMAGE_FIELD_LABELS=[['kia','사망'],['serious','중상'],['minor','경상'],['destroyed','완파'],['heavy_damage','중파'],['light_damage','소파']];
function damageSummary(r){
  const parts=DAMAGE_FIELD_LABELS.filter(function(l){ return r[l[0]]!=null && +r[l[0]]>0; }).map(function(l){ return l[1]+' '+r[l[0]]; });
  return parts.length ? parts.join(' · ') : '확인된 피해 없음';
}

async function submitReport(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:null;};
  const rla=g('r_lat'), rln=g('r_lng');
  if(!rla || !rln){
    toast('⚠ 좌표를 입력하세요 — 지도를 탭하거나 군사좌표를 입력해 주세요');
    const mapEl=document.getElementById('r_map');
    if(mapEl){
      mapEl.classList.add('pulse-highlight');
      mapEl.scrollIntoView({behavior:'smooth', block:'center'});
      setTimeout(function(){ mapEl.classList.remove('pulse-highlight'); }, 2200);
    }
    return;
  }
  const body={team_id:SESS.team_id,kind:RKIND,mode:MODE};
  body.lat=+rla; body.lng=+rln; body.coord=toMGRS(+rla,+rln)||'';
  if(REPORT_CONTEXT && REPORT_CONTEXT.missionId!=null){ body.mission_id=REPORT_CONTEXT.missionId; }
  if(RKIND==='recon'){
    RECON_FIELD_LABELS.forEach(function(l){ const v=+g('r_'+l[0]); if(v>0) body[l[0]]=v; });
    body.hostile=document.getElementById('r_hostile').checked?1:0;
    body.unidentified=document.getElementById('r_unidentified').checked?1:0;
    const activityBtn=document.querySelector('#r_activity_seg button.on');
    if(activityBtn){
      body.activity=activityBtn.dataset.v;
      if(body.activity==='moving'||body.activity==='attacking'){ body.direction=document.getElementById('r_direction').value; }
    }
  }
  else if(RKIND==='attack'){
    const activeBtn=document.querySelector('#r_attack_result_seg button.on');
    body.attack_result = activeBtn ? activeBtn.dataset.v : 'hit';
    if(body.attack_result==='other'){ body.attack_result_note=document.getElementById('r_attack_result_note').value.trim(); }
  }
  else{
    ['kia','serious','minor','destroyed','heavy_damage','light_damage'].forEach(function(k){ const v=+g('r_'+k); if(v>0) body[k]=v; });
  }
  try{ await api('/reports','POST',body); toast('보고 전송됨'); REPORT_CONTEXT=null; renderReport(); }catch(e){ toast('전송 실패'); }
}
async function loadMyReports(){
  const el=document.getElementById('my_reports');

  try{
    const d=await api('/reports?team_id='+(SESS.team_id||''));
    const reports=(d.reports||[]).slice(0,20);
    el.innerHTML = reports.length ? reports.map(reportCardHtml).join('') : '<div class="card muted">등록된 보고가 없습니다.</div>';
  }catch(e){ el.innerHTML='<div class="warn">불러오기 실패</div>'; }

const KIND_LABELS={recon:'정찰',attack:'공격',damage:'피해평가',photo:'사진'};
const ATTACK_RESULT_LABELS={hit:'명중',unknown:'불명',other:'기타'};
function attackResultSummary(r){
  if(!r.attack_result) return '결과 미기재';

    const activeBtn=seg?seg.querySelector('button.on'):null;
    body.attack_result = activeBtn ? activeBtn.dataset.v : 'hit';
    body.attack_result_note = body.attack_result==='other' ? document.getElementById('re_attack_result_note_'+id).value.trim() : null;
  }else{
    DAMAGE_FIELD_LABELS.forEach(function(l){ body[l[0]]=+g('re_'+l[0]); });
  }
  const mgrsResult=readMgrsEdit(id);
  if(mgrsResult){ body.lat=mgrsResult.lat; body.lng=mgrsResult.lng; body.coord=mgrsResult.coord; }
  else{ toast('좌표 형식을 확인하세요 — 좌표 없이 나머지만 저장됩니다'); }
  try{ await api('/reports/update','POST',body); toast('보고 수정됨'); loadMyReports(); }catch(e){ toast('수정 실패'); }
}

// ---- ALERTS ----
async function renderChat(){
  const v=document.getElementById('view'); v.innerHTML='<div class="muted">불러오는 중…</div>';
  try{
    const msgd = await api('/messages');
    const msgs=msgd.messages||[];
    updateChatAlertBanner(msgs);
    v.innerHTML = `
      <h2>관리자와 대화</h2>
      <div id="op_msg_history" style="display:flex;flex-direction:column;gap:7px;margin-bottom:110px"></div>
      <div class="chat-input-fixed">
        <textarea id="op_msg_body" placeholder="메시지 입력" style="width:100%;min-height:44px;padding:9px;border-radius:9px;border:1px solid var(--line);background:var(--surface2);color:var(--ink);font-family:inherit;font-size:13px;resize:vertical"></textarea>
        <button class="btn btn-amber" style="width:100%;margin-top:7px;padding:9px" onclick="opSendMessage()">전송</button>
      </div>`;
    renderOpMsgHistory(msgs);
    window.scrollTo(0, document.body.scrollHeight);
  }catch(e){ v.innerHTML=err(e); }
}
function renderOpMsgHistory(msgs){
  const el=document.getElementById('op_msg_history'); if(!el) return;
  el.innerHTML = msgs.length ? msgs.map(function(m){
    const mine = m.direction==='from_team';
    const readTag = (mine && m.read_at) ? ' · <span style="color:#6fe0a0">읽음</span>' : '';
    return `<div style="align-self:${mine?'flex-end':'flex-start'};max-width:82%;background:${mine?'var(--navy)':'var(--surface2)'};
      border-radius:9px;padding:7px 10px;font-size:12.5px">
      <div>${esc(m.body)}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px">${esc(String(m.created_at)).slice(5,16)}${readTag}</div></div>`;
  }).join('') : '<span class="muted" style="font-size:11.5px">메시지가 없습니다.</span>';
}
async function opSendMessage(){
  const body=document.getElementById('op_msg_body').value.trim();
  if(!body) return;
  try{
    await api('/messages','POST',{body});
    document.getElementById('op_msg_body').value='';
    renderChat();
    toast('메시지 전송됨');
  }catch(e){ toast('전송 실패'); }
}

function err(e){return `<div class="warn">불러오기 실패: ${esc(e&&e.error||'네트워크 오류')}</div>`;}

async function loadTeamSelector(){
  const sel=document.getElementById('in_team');
  if(!sel) return;
  try{
    const r=await fetch(API+'/public/team-list');
    const d=await r.json();
    const teams=d.teams||[];
    sel.innerHTML = teams.length
      ? teams.map(function(t){ return `<option value="${esc(t.team_no)}">${esc(t.team_no)}팀</option>`; }).join('')
      : '<option value="">등록된 팀이 없습니다</option>';
  }catch(e){ sel.innerHTML='<option value="">불러오기 실패</option>'; }
}
loadTeamSelector();

// ---- restore session ----
(function(){
  const t=sessionStorage.getItem('iuccs_token');
  if(t){ TOKEN=t; try{SESS=JSON.parse(sessionStorage.getItem('iuccs_sess')||'{}')}catch(e){} MODE=SESS.mode||'real'; enterApp(); }
})();
</script>
