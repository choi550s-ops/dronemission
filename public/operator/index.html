<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>IUCCS · 조종자 앱</title>
<style>
  :root{--bg:#0A111E;--surface:#152439;--surface2:#0b1626;--line:#24384F;--navy:#1F3A5F;
    --steel:#2E5A88;--ink:#EAF2FC;--text:#C4D4E7;--muted:#7C90A8;--amber:#E8A33D;--amberD:#C9871B;
    --red:#E24A3B;--yellow:#E1A800;--green:#2FA35A;--blue:#3B82D6;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    max-width:460px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  .mono{font-family:"SF Mono",ui-monospace,Consolas,monospace}
  .ribbon{padding:11px 15px;background:linear-gradient(180deg,#15243a,#111e31);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:9px;position:sticky;top:0;z-index:10}
  .ribbon .team{font-weight:800;color:var(--ink);font-size:16px}
  .ribbon .clk{margin-left:auto;font-size:12.5px;color:#AFC3DA}
  .modeb{font-size:11px;font-weight:800;letter-spacing:.05em;padding:3px 9px;border-radius:6px}
  .mode-real{background:rgba(226,74,59,.16);color:#FF8579;border:1px solid rgba(226,74,59,.5)}
  .mode-sim{background:rgba(232,163,61,.16);color:#F3C070;border:1px solid rgba(232,163,61,.5)}
  main{flex:1;padding:14px 14px 78px;display:flex;flex-direction:column;gap:11px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 14px}
  .lbl{font-size:11px;letter-spacing:.12em;color:var(--muted);font-weight:700;margin-bottom:7px}
  .between{display:flex;align-items:center;justify-content:space-between}
  .row{display:flex;align-items:center;gap:9px}
  .val{color:var(--ink);font-weight:700}
  .chip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px}
  .badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:6px}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  input,select{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:10px;
    color:var(--ink);padding:12px;font-size:15px;font-family:inherit}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:11px;
    padding:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
  .btn-amber{background:linear-gradient(180deg,var(--amber),var(--amberD));color:#1a1206}
  .btn-ghost{background:transparent;border:1px solid var(--steel);color:#CFE0F0}
  .seg{display:flex;background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px}
  .seg button{flex:1;border:none;background:transparent;color:var(--muted);font-weight:700;font-size:13.5px;
    padding:9px;border-radius:7px;cursor:pointer;font-family:inherit}
  .seg button.on{background:var(--navy);color:#fff}
  .tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;height:64px;
    border-top:1px solid var(--line);background:#0c182a;display:flex}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    color:var(--muted);font-size:9.5px;font-weight:700;border:none;background:none;cursor:pointer;font-family:inherit;padding:0 2px}
  .tab.on{color:var(--amber)}
  .tab .ic{font-size:17px}
  h2{color:var(--ink);font-size:16px;margin:2px 0 2px}
  .muted{color:var(--muted)}
  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:#16324b;border:1px solid var(--steel);
    color:#dff0ff;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;transition:.3s;z-index:30}
  .toast.show{opacity:1}
  /* login */
  #login{flex:1;display:flex;flex-direction:column;justify-content:center;gap:16px;padding:24px 22px 40px}
  .logo{width:56px;height:56px;border-radius:15px;margin:0 auto 12px;background:linear-gradient(160deg,#2e5a88,#16273f);
    display:flex;align-items:center;justify-content:center;font-size:26px}
  .warn{background:rgba(232,163,61,.1);border:1px solid rgba(232,163,61,.35);color:#f3c882;
    font-size:12px;line-height:1.4;padding:9px 11px;border-radius:9px}
</style>
<style>
  .pickmap{height:200px;border-radius:11px;border:1px solid var(--line);margin-top:8px;background:#0b1626;z-index:1}
  .minimap{height:180px;border-radius:12px;border:1px solid var(--line);margin:4px 0 2px;background:#0b1626;z-index:1}
  .geo{font-size:12px;color:var(--muted);margin-top:8px}
  .geo b{color:var(--ink);font-family:"SF Mono",monospace}
  .rcoords{font-size:12px;color:var(--text);margin-top:7px;line-height:1.6}
  .rcoords .mono{color:#cfe0f0}
  .wp{background:transparent!important;border:none!important;box-shadow:none!important;color:#12222f;font-weight:800;font-size:11px;padding:0}
  .wp:before,.wp:after{display:none!important}
  .teamlabel{background:rgba(11,22,38,.88)!important;color:#fff!important;border:1px solid rgba(255,255,255,.18)!important;
    box-shadow:none!important;padding:1px 7px!important;border-radius:5px!important;font-size:10.5px!important;font-weight:800!important}
  .teamlabel:before{display:none!important}
  .diamond-icon{background:transparent!important;border:none!important}
  .diamond{width:12px;height:12px;background:#E24A3B;border:2px solid #0b1626;transform:rotate(45deg);box-shadow:0 0 4px rgba(226,74,59,.7)}
  @keyframes hostileBlink{0%,100%{opacity:1}50%{opacity:.32}}
  .diamond.blinking{animation:hostileBlink 1.1s ease-in-out infinite}
  .friendly-icon{background:transparent!important;border:none!important}
  .friendly-square{width:11px;height:11px;background:#2FA35A;border:2px solid #0b1626;box-shadow:0 0 4px rgba(47,163,90,.6)}
  .leaflet-tooltip{background:#16273f;color:#dce8f5;border:1px solid #2e5a88;font-size:11.5px}
  .leaflet-popup-content-wrapper,.leaflet-popup-tip{background:#16273f;color:#dce8f5;border:1px solid #2e5a88}
  .leaflet-popup-content{font-size:12px;margin:8px 10px;line-height:1.5}
  .leaflet-container{font-family:inherit;background:#0b1626}
  .leaflet-bar a{background:#16273f;color:#cfe0f0;border-color:#2e5a88}
  .leaflet-control-attribution{background:rgba(11,22,38,.7)!important;color:#6b7a8c!important}
  .leaflet-control-attribution a{color:#8fa4bd!important}
</style>
<link rel="stylesheet" href="../vendor/leaflet/leaflet.css">
<script src="../vendor/leaflet/leaflet.js"></script>
<script src="../vendor/mgrs/mgrs.min.js"></script>
</head>
<body>

<!-- ===== LOGIN ===== -->
<section id="login">
  <div style="text-align:center">
    <div class="logo">🛰️</div>
    <div style="color:var(--ink);font-weight:800;font-size:18px">통합무인전투 통제체계</div>
    <div class="mono" style="color:var(--amber);font-size:11px;letter-spacing:.14em;margin-top:5px">IUCCS · OPERATOR</div>
  </div>
  <div><div class="lbl">팀 번호</div><input id="in_team" class="mono" placeholder="예: 03" value="03" inputmode="numeric"></div>
  <div><div class="lbl">비밀번호</div><input id="in_pw" type="password" placeholder="관리자 할당 비밀번호"></div>
  <div><div class="lbl">운용 모드</div>
    <div class="seg" id="loginmode">
      <button data-m="real" class="on">실제</button><button data-m="sim">모의(훈련)</button>
    </div>
  </div>
  <button class="btn btn-amber" onclick="doLogin()">🔒 접속</button>
  <div id="login_err" class="warn" style="display:none"></div>
  <div class="muted" style="text-align:center;font-size:12px">비밀번호는 관리자가 할당합니다</div>
</section>

<!-- ===== APP ===== -->
<div id="app" style="display:none;flex-direction:column;flex:1">
  <div class="ribbon">
    <span class="team" id="rb_team">3팀</span>
    <span class="modeb" id="rb_mode">실제</span>
    <span class="chip" id="rb_role" style="background:rgba(59,130,214,.18);color:#8fc0ff">운용자</span>
    <span class="clk mono" id="rb_clk">--:--:--</span>
    <button id="logoutbtn" onclick="doLogout()" title="로그아웃"
      style="background:none;border:none;color:var(--muted);font-size:17px;padding:2px 0 2px 4px;cursor:pointer;line-height:1">⏻</button>
  </div>
  <main id="view"></main>
  <nav class="tabs" id="tabs">
    <button class="tab on" data-v="home"><span class="ic">🏠</span>홈</button>
    <button class="tab" data-v="missions"><span class="ic">🎯</span>임무</button>
    <button class="tab" data-v="drones"><span class="ic">✈️</span>기체</button>
    <button class="tab" data-v="report"><span class="ic">📋</span>보고</button>
    <button class="tab" data-v="fire"><span class="ic">📡</span>화력</button>
    <button class="tab" data-v="alerts"><span class="ic">🔔</span>알림</button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
const API = location.pathname.replace(/\/public\/.*$/, '') + '/api';
let TOKEN=null, SESS={}, MODE='real';

// ---- helpers ----
async function api(path, method='GET', body=null){
  const h={'Content-Type':'application/json'};
  if(TOKEN) h['Authorization']='Bearer '+TOKEN;
  const r=await fetch(API+path,{method,headers:h,body:body?JSON.stringify(body):null});
  let d={}; try{d=await r.json()}catch(e){}
  if(!r.ok) throw d;
  return d;
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1900);}
const esc=s=>String(s??'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
function toMGRS(lat,lng){
  if(lat==null||lng==null||lat===''||lng===''||isNaN(+lat)||isNaN(+lng)) return null;
  try{ const s=mgrs.forward([+lng,+lat],5); const mt=s.match(/^(\d{1,2}[C-X])([A-Z]{2})(\d+)$/);
    if(mt){ const dd=mt[3], h=dd.length/2; return mt[1]+' '+mt[2]+' '+dd.slice(0,h)+' '+dd.slice(h); } return s;
  }catch(e){ return null; }
}
function coordText(lat,lng,fallback){ const m=toMGRS(lat,lng); return m||fallback||'-'; }
const TEAMPAL=['#56B4E9','#E69F00','#009E73','#CC79A7','#D55E00','#0072B2','#B0BEC5','#F0E442'];
function teamColorForNo(no){ const n=parseInt(no,10); const idx=isNaN(n)?0:Math.abs(n-1)%TEAMPAL.length; return TEAMPAL[idx]; }
const COMM={good:'양호',weak:'미약',lost:'두절'}, GPS={fixed:'고정',searching:'탐색',none:'없음'};
const MSTAT={issued:'하달',acknowledged:'확인',in_progress:'수행중',completed:'완료',cancelled:'취소',pending_approval:'승인대기'};
const FSTAT={received:'접수',reviewing:'검토',approved:'승인',held:'보류',executed:'시행',rejected:'반려'};
function sdot(c){return `<span class="dot" style="background:${c}"></span>`}
function modeBadge(){document.getElementById('rb_mode').className='modeb '+(MODE==='sim'?'mode-sim':'mode-real');
  document.getElementById('rb_mode').textContent=MODE==='sim'?'모의':'실제';}

// ---- login ----
document.querySelectorAll('#loginmode button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#loginmode button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); MODE=b.dataset.m;});
async function doLogin(){
  const team=document.getElementById('in_team').value.trim();
  const pw=document.getElementById('in_pw').value;
  const err=document.getElementById('login_err'); err.style.display='none';
  try{
    const r=await api('/login','POST',{team_no:team,password:pw,mode:MODE});
    TOKEN=r.token; SESS=r; MODE=r.mode;
    sessionStorage.setItem('iuccs_token',TOKEN); sessionStorage.setItem('iuccs_sess',JSON.stringify(r));
    enterApp();
  }catch(e){ err.textContent='접속 실패 — 팀 번호·비밀번호를 확인하세요.'; err.style.display='block'; }
}
function enterApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('rb_team').textContent=(SESS.team_no||'-')+'팀';
  const roleKo={admin:'관리자',leader:'팀장',operator:'운용자',fire_coord:'화력협조',observer:'참관'}[SESS.role]||SESS.role;
  document.getElementById('rb_role').textContent=roleKo;
  modeBadge(); startClock(); go('home');
}
function startClock(){setInterval(()=>{const n=new Date();
  document.getElementById('rb_clk').textContent=n.toTimeString().slice(0,8);},1000);}

// ---- nav ----
document.querySelectorAll('#tabs .tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('#tabs .tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on'); go(t.dataset.v);});
function go(v){({home:renderHome,missions:renderMissions,drones:renderDrones,report:renderReport,fire:renderFire,alerts:renderAlerts}[v])();}
function doLogout(){
  if(!confirm('로그아웃 하시겠습니까?')) return;
  api('/logout','POST').catch(()=>{});
  sessionStorage.removeItem('iuccs_token'); sessionStorage.removeItem('iuccs_sess');
  TOKEN=null; SESS={};
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('in_pw').value='';
}

// ---- MAP helpers ----
const TILE='https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
const TCOL={unavailable:'#E24A3B',preparing:'#E1A800',ready:'#2FA35A',on_mission:'#3B82D6'};
function darkTiles(map){L.tileLayer(TILE,{maxZoom:19,subdomains:'abcd',attribution:'&copy; OSM &copy; CARTO'}).addTo(map);}
function mountPicker(elId,onSet){
  if(typeof L==='undefined')return null;
  const map=L.map(elId,{zoomControl:true}).setView([37.555,127.01],13);
  darkTiles(map); let marker=null;
  map.on('click',function(e){
    const la=e.latlng.lat, ln=e.latlng.lng;
    if(marker)marker.setLatLng([la,ln]); else marker=L.circleMarker([la,ln],{radius:8,color:'#0b1626',weight:2,fillColor:'#E8A33D',fillOpacity:.95}).addTo(map);
    onSet(la,ln);
  });
  setTimeout(function(){map.invalidateSize();},250);
  return map;
}
function diamondIcon(blink){ return L.divIcon({className:'diamond-icon',html:'<div class="diamond'+(blink?' blinking':'')+'"></div>',iconSize:[13,13],iconAnchor:[6,6]}); }
function friendlySquareIcon(){ return L.divIcon({className:'friendly-icon',html:'<div class="friendly-square"></div>',iconSize:[11,11],iconAnchor:[5,5]}); }
async function homeMap(){
  if(typeof L==='undefined'||!document.getElementById('home_map'))return;
  const map=L.map('home_map',{zoomControl:false,attributionControl:false}).setView([37.555,127.01],12);
  darkTiles(map);
  try{
    const d=await api('/map'); const pts=[];
    const teamNoOf={}; (d.teams||[]).forEach(function(t){ teamNoOf[t.id]=t.team_no; });
    (d.teams||[]).forEach(function(t){
      const border=TCOL[t.status]||'#7C90A8';
      const fill=teamColorForNo(t.team_no);
      const m=L.circleMarker([+t.lat,+t.lng],{radius:8,weight:3,color:border,fillColor:fill,fillOpacity:.95});
      m.bindTooltip(esc(t.team_no)+'팀',{permanent:true,direction:'right',offset:[9,0],className:'teamlabel'});
      m.addTo(map);
      pts.push([+t.lat,+t.lng]);
    });
    (d.reports||[]).forEach(function(r){
      const teamNo=teamNoOf[r.team_id]||r.team_id;
      const info = r.kind==='recon' ? `병력 ${r.troops||0} · 트럭 ${r.trucks||0} · 차량 ${r.vehicles||0}` : (r.note||'');
      const at=r.action_taken||'none';
      let m, tip;
      if(r.hostile==1 && at==='friendly'){
        m=L.marker([+r.lat,+r.lng],{icon:friendlySquareIcon()});
        tip='<b>'+esc(teamNo)+'팀 보고</b> · <span style="color:#6fe0a0">■ 아군 확인</span><br>'+esc(info);
      } else if(r.hostile==1){
        m=L.marker([+r.lat,+r.lng],{icon:diamondIcon(at==='none')});
        tip='<b>'+esc(teamNo)+'팀 보고</b> · <span style="color:#ff8579">🔺적 식별</span><br>'+esc(info);
      } else {
        m=L.circleMarker([+r.lat,+r.lng],{radius:5,weight:2,color:'#0b1626',fillColor:'#E8A33D',fillOpacity:.95});
        tip='<b>'+esc(teamNo)+'팀 보고</b><br>'+esc(info);
      }
      m.bindTooltip(tip,{direction:'top',sticky:true}).addTo(map);
      pts.push([+r.lat,+r.lng]);
    });
    (d.fire_requests||[]).forEach(function(f){
      const teamNo=teamNoOf[f.team_id]||f.team_id;
      L.circleMarker([+f.lat,+f.lng],{radius:6,weight:2,color:'#0b1626',fillColor:'#ff5b5b',fillOpacity:.95})
        .bindTooltip('<b>'+esc(teamNo)+'팀 화력요청</b><br>'+esc(f.target||''),{direction:'top',sticky:true}).addTo(map);
      pts.push([+f.lat,+f.lng]);
    });
    if(pts.length)map.fitBounds(pts,{padding:[28,28],maxZoom:14});
  }catch(e){}
  setTimeout(function(){map.invalidateSize();},250);
}

// ---- HOME ----
async function renderHome(){
  const v=document.getElementById('view');
  v.innerHTML='<div class="muted">불러오는 중…</div>';
  try{
    const d=await api('/drones?team_id='+(SESS.team_id||''));
    const drones=d.drones||[];
    let cards=drones.map(dr=>{
      const bp=dr.battery_pct??'-';
      const bc=bp>=50?'var(--green)':(bp>=20?'var(--yellow)':'var(--red)');
      const cc=dr.comm_status==='good'?'var(--green)':(dr.comm_status==='weak'?'var(--yellow)':'var(--red)');
      const gc=dr.gps_status==='fixed'?'var(--green)':(dr.gps_status==='searching'?'var(--yellow)':'var(--red)');
      return `<div class="card">
        <div class="between" style="margin-bottom:9px"><div class="row">✈️ <span class="val">기체 ${esc(dr.code)}</span></div>
          <span class="chip" style="background:rgba(47,163,90,.16);color:#6fe0a0">${STATLBL[dr.status]||esc(dr.status)}</span></div>
        <div class="between" style="font-size:13px;padding:4px 0"><span class="row">${sdot(bc)}배터리</span><span class="val mono">${bp}%</span></div>
        <div class="between" style="font-size:13px;padding:4px 0"><span class="row">${sdot(cc)}통신</span><span class="val">${COMM[dr.comm_status]||dr.comm_status}</span></div>
        <div class="between" style="font-size:13px;padding:4px 0"><span class="row">${sdot(gc)}GPS</span><span class="val">${GPS[dr.gps_status]||dr.gps_status}</span></div>
        <div class="between" style="font-size:13px;padding:4px 0"><span class="row">${sdot('var(--yellow)')}최대 비행</span><span class="val mono">${dr.max_flight_min??'-'}분</span></div>
      </div>`;}).join('');
    if(!drones.length) cards='<div class="card muted">배정된 기체가 없습니다.</div>';
    v.innerHTML=`<div class="between"><div class="lbl" style="margin:0">내 역할</div>
      <span class="badge" style="background:var(--navy);color:#cfe0f0">${document.getElementById('rb_role').textContent}</span></div>
      <div class="lbl" style="margin:12px 0 0">상황 지도</div>
      <div id="home_map" class="minimap"></div>${cards}`;
    homeMap();
  }catch(e){ v.innerHTML=err(e); }
}

// ---- DRONES (기체 현황 관리) ----
const STATLBL={available:'가용',in_use:'임무중',maintenance:'정비중',down:'고장'};
async function renderDrones(){
  const v=document.getElementById('view');
  v.innerHTML='<div class="muted">불러오는 중…</div>';
  try{
    const d=await api('/drones?team_id='+(SESS.team_id||''));
    const drones=d.drones||[];
    v.innerHTML = `<h2>기체 현황 관리</h2>
      <div id="dronelist" style="display:flex;flex-direction:column;gap:10px">${drones.length?'':'<div class="card muted">배정된 기체가 없습니다.</div>'}</div>
      <div class="card" style="margin-top:4px">
        <div class="lbl">신규 기체 등록</div>
        <input id="nd_code" placeholder="기체 코드 (예: D-09)" style="margin-bottom:8px">
        <input id="nd_model" placeholder="모델명 (선택)" style="margin-bottom:8px">
        <button class="btn btn-ghost" style="padding:10px" onclick="createDrone()">+ 기체 추가</button>
      </div>`;
    const list=document.getElementById('dronelist');
    list.innerHTML = drones.map(function(dr){ return droneCard(dr); }).join('');
  }catch(e){ v.innerHTML=err(e); }
}
function droneCard(dr){
  const bp=dr.battery_pct??0;
  return `<div class="card" id="dc_${dr.id}">
    <div class="between" style="margin-bottom:9px"><span class="val">✈️ ${esc(dr.code)}</span>
      <span class="muted" style="font-size:11.5px">${esc(dr.model||'')}</span></div>
    <div class="lbl">배터리 (%)</div>
    <input type="number" min="0" max="100" id="dr_bp_${dr.id}" value="${bp}" style="margin-bottom:9px">
    <div class="lbl">통신 상태</div>
    <select id="dr_comm_${dr.id}" style="margin-bottom:9px">
      <option value="good" ${dr.comm_status==='good'?'selected':''}>양호</option>
      <option value="weak" ${dr.comm_status==='weak'?'selected':''}>미약</option>
      <option value="lost" ${dr.comm_status==='lost'?'selected':''}>두절</option>
    </select>
    <div class="lbl">GPS 상태</div>
    <select id="dr_gps_${dr.id}" style="margin-bottom:9px">
      <option value="fixed" ${dr.gps_status==='fixed'?'selected':''}>고정</option>
      <option value="searching" ${dr.gps_status==='searching'?'selected':''}>탐색중</option>
      <option value="none" ${dr.gps_status==='none'?'selected':''}>없음</option>
    </select>
    <div class="lbl">운용 상태</div>
    <select id="dr_stat_${dr.id}" style="margin-bottom:10px">
      <option value="available" ${dr.status==='available'?'selected':''}>가용</option>
      <option value="in_use" ${dr.status==='in_use'?'selected':''}>임무중</option>
      <option value="maintenance" ${dr.status==='maintenance'?'selected':''}>정비중</option>
      <option value="down" ${dr.status==='down'?'selected':''}>고장</option>
    </select>
    <button class="btn btn-amber" style="padding:10px" onclick="saveDrone(${dr.id})">상태 저장</button>
  </div>`;
}
async function saveDrone(id){
  const g=k=>document.getElementById(k+'_'+id).value;
  try{
    await api('/drones/update','POST',{id,battery_pct:+g('dr_bp'),comm_status:g('dr_comm'),gps_status:g('dr_gps'),status:g('dr_stat')});
    toast('기체 상태 저장됨');
  }catch(e){ toast('저장 실패'); }
}
async function createDrone(){
  const code=document.getElementById('nd_code').value.trim();
  const model=document.getElementById('nd_model').value.trim();
  if(!code){ toast('기체 코드를 입력하세요'); return; }
  try{
    await api('/drones/create','POST',{team_id:SESS.team_id,code,model});
    toast('기체 추가됨'); renderDrones();
  }catch(e){ toast('추가 실패 (중복 코드일 수 있음)'); }
}

// ---- MISSIONS ----
function completeWidget(m){
  if(m.status==='completed') return `<div class="geo" style="margin-top:9px;color:#6fe0a0">✔ 임무 완료 보고됨${m.completion_note?' — '+esc(m.completion_note):''}</div>`;
  if(m.status==='cancelled') return '';
  return `
    <div id="cbtn_${m.id}" style="margin-top:9px">
      <button class="btn btn-ghost" style="padding:9px;font-size:12.5px" onclick="showCompleteForm(${m.id})">✅ 임무 완료 보고</button>
    </div>
    <div id="cform_${m.id}" style="display:none;margin-top:9px">
      <input id="cf_note_${m.id}" placeholder="완료 내용 (선택)" style="margin-bottom:7px">
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost" style="padding:9px;font-size:12px;flex:1" onclick="cancelCompleteForm(${m.id})">취소</button>
        <button class="btn btn-amber" style="padding:9px;font-size:12px;flex:1" onclick="completeMission(${m.id})">완료 전송</button>
      </div>
    </div>`;
}
function showCompleteForm(id){
  const b=document.getElementById('cbtn_'+id); if(b) b.style.display='none';
  const f=document.getElementById('cform_'+id); if(f) f.style.display='block';
}
function cancelCompleteForm(id){
  const b=document.getElementById('cbtn_'+id); if(b) b.style.display='block';
  const f=document.getElementById('cform_'+id); if(f) f.style.display='none';
}
async function completeMission(id){
  const e=document.getElementById('cf_note_'+id);
  try{ await api('/missions/complete','POST',{id,note:e?e.value:''}); toast('임무 완료 보고됨'); renderMissions(); }catch(err){ toast('전송 실패'); }
}
function respWidget(m){
  const t=m.response_type;
  if(t==='ack') return `<div class="geo" style="margin-top:9px"><span class="mono" style="color:#6fe0a0">✔ 수신확인 완료</span></div>`;
  if(t==='unable') return `<div class="geo" style="margin-top:9px;color:#ff8579">✖ 임무불가${m.response_reason?' (사유: '+esc(m.response_reason)+')':''}</div>`;
  if(t==='delay') return `<div class="geo" style="margin-top:9px;color:var(--amber)">⏱ 준비시간 : ${m.response_delay_min||0}분${m.response_reason?' (사유: '+esc(m.response_reason)+')':''}</div>`;
  return `
    <div id="respbtns_${m.id}" style="display:flex;gap:6px;margin-top:9px">
      <button class="btn btn-ghost" style="padding:9px;font-size:12px;flex:1" onclick="respondMission(${m.id},'ack')">✔ 수신확인</button>
      <button class="btn btn-ghost" style="padding:9px;font-size:12px;flex:1" onclick="showRespForm(${m.id},'unable')">✖ 임무불가</button>
      <button class="btn btn-ghost" style="padding:9px;font-size:12px;flex:1" onclick="showRespForm(${m.id},'delay')">⏱ 준비필요</button>
    </div>
    <div id="respform_unable_${m.id}" style="display:none;margin-top:9px">
      <input id="un_reason_${m.id}" placeholder="임무불가 사유" style="margin-bottom:7px">
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost" style="padding:9px;font-size:12px;flex:1" onclick="cancelRespForm(${m.id})">취소</button>
        <button class="btn btn-amber" style="padding:9px;font-size:12px;flex:1" onclick="respondMission(${m.id},'unable')">전송</button>
      </div>
    </div>
    <div id="respform_delay_${m.id}" style="display:none;margin-top:9px">
      <input id="dl_min_${m.id}" type="number" placeholder="준비 시간(분)" style="margin-bottom:7px">
      <input id="dl_reason_${m.id}" placeholder="사유" style="margin-bottom:7px">
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost" style="padding:9px;font-size:12px;flex:1" onclick="cancelRespForm(${m.id})">취소</button>
        <button class="btn btn-amber" style="padding:9px;font-size:12px;flex:1" onclick="respondMission(${m.id},'delay')">전송</button>
      </div>
    </div>`;
}
function showRespForm(id,type){
  const b=document.getElementById('respbtns_'+id); if(b) b.style.display='none';
  const f=document.getElementById('respform_'+type+'_'+id); if(f) f.style.display='block';
}
function cancelRespForm(id){
  const b=document.getElementById('respbtns_'+id); if(b) b.style.display='flex';
  ['unable','delay'].forEach(function(t){ const f=document.getElementById('respform_'+t+'_'+id); if(f) f.style.display='none'; });
}
async function respondMission(id,type){
  const body={id,response:type};
  if(type==='unable'){ const e=document.getElementById('un_reason_'+id); body.reason=e?e.value:''; }
  if(type==='delay'){
    const em=document.getElementById('dl_min_'+id), er=document.getElementById('dl_reason_'+id);
    body.delay_min=em&&em.value?+em.value:null; body.reason=er?er.value:'';
  }
  try{ await api('/missions/respond','POST',body); toast('응답 전송됨'); renderMissions(); }catch(e){ toast('전송 실패'); }
}
async function renderMissions(){
  const v=document.getElementById('view'); v.innerHTML='<div class="muted">불러오는 중…</div>';
  try{
    const d=await api('/missions?team_id='+(SESS.team_id||''));
    const ms=d.missions||[];
    if(!ms.length){ v.innerHTML='<div class="card muted">수신된 임무가 없습니다.</div>'; return; }
    const routes={};
    v.innerHTML=ms.map(m=>{
      const atk=m.type==='attack';
      let pts=null; if(m.route_points){ try{ pts=JSON.parse(m.route_points); }catch(e){} }
      if(pts&&pts.length) routes[m.id]=pts;
      const gate=atk&&!(m.approved==1)?`<div class="warn" style="margin:9px 0">⚠ 지휘관 승인·교전규칙(ROE) 확인 후 수행 가능</div>`:'';
      const respBlock=respWidget(m);
      const completeBlock=completeWidget(m);
      const statusChip = m.status==='completed'
        ? '<span class="chip" style="background:rgba(47,163,90,.16);color:#6fe0a0">✔ 임무완료</span>'
        : (m.status==='cancelled'
          ? '<span class="chip" style="background:rgba(124,144,168,.16);color:var(--muted)">취소됨</span>'
          : `<span class="chip" style="background:rgba(232,163,61,.14);color:var(--amber)">${MSTAT[m.status]||m.status}</span>`);
      const mapBlock=(pts&&pts.length)?`
        <div class="lbl" style="margin:11px 0 0">${atk?'표적 위치':'경로 ('+pts.length+'개 지점)'}</div>
        <div id="mmap_${m.id}" class="pickmap" style="height:180px"></div>
        <div class="rcoords">${pts.map((p,i)=>'<div>'+(i+1)+') <span class="mono">'+esc(toMGRS(p[0],p[1])||'')+'</span></div>').join('')}</div>`:'';
      const cardStyle = (atk?'border-color:rgba(232,163,61,.45);':'') + (m.status==='completed'?'opacity:.7;':'');
      return `<div class="card" ${cardStyle?`style="${cardStyle}"`:''}>
        <div class="between" style="margin-bottom:8px">
          <span class="badge" style="background:${atk?'rgba(226,74,59,.18);color:#ff8579':'rgba(59,130,214,.18);color:#8fc0ff'}">${atk?'공격':'정찰'}</span>
          ${statusChip}</div>
        <div class="between" style="font-size:13px;padding:3px 0"><span class="muted">위치</span><span class="mono" style="color:#CFE0F0">${esc(coordText(m.lat,m.lng,m.coord))}</span></div>
        <div class="between" style="font-size:13px;padding:3px 0"><span class="muted">${atk?'방식':'경로'}</span><span class="val" style="font-size:13px">${esc(atk?(m.method||'표적지정'):(m.route||'-'))}</span></div>
        ${mapBlock}${gate}${respBlock}${completeBlock}</div>`;}).join('');
    Object.keys(routes).forEach(function(id){ mountRouteMap('mmap_'+id, routes[id]); });
  }catch(e){ v.innerHTML=err(e); }
}
function mountRouteMap(elId,pts){
  if(typeof L==='undefined'||!document.getElementById(elId))return;
  const map=L.map(elId,{zoomControl:true}).setView(pts[0],14);
  darkTiles(map);
  const color=teamColorForNo(SESS.team_no);
  if(pts.length>1) L.polyline(pts,{color:color,weight:3,dashArray:'6,7'}).addTo(map);
  pts.forEach(function(p,i){
    L.circleMarker(p,{radius:8,color:'#0b1626',weight:2,fillColor:color,fillOpacity:.95})
      .bindTooltip(String(i+1),{permanent:true,direction:'center',className:'wp'}).addTo(map);
  });
  try{ map.fitBounds(pts,{padding:[24,24],maxZoom:15}); }catch(e){}
  setTimeout(function(){map.invalidateSize();},250);
}


// ---- REPORT ----
let RKIND='recon';
function renderReport(){
  const v=document.getElementById('view');
  v.innerHTML=`
    <h2>결과 보고</h2>
    <div class="seg" id="rkind"><button data-k="recon" class="on">정찰</button><button data-k="attack">공격 / 피해</button></div>
    <div class="card"><div class="lbl">식별 위치 (군사좌표)</div><input id="r_coord" class="mono" placeholder="WQ 0000 0000"></div>
    <div class="card"><div class="lbl">위치 — 지도를 눌러 지정</div>
      <div id="r_map" class="pickmap"></div>
      <div class="geo" id="r_geo">아직 지정 안 됨 (지도를 탭하세요)</div>
      <input type="hidden" id="r_lat"><input type="hidden" id="r_lng"></div>
    <div id="rfields"></div>
    <button class="btn btn-amber" onclick="submitReport()">✔ 보고 전송</button>`;
  document.querySelectorAll('#rkind button').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('#rkind button').forEach(x=>x.classList.remove('on'));b.classList.add('on');RKIND=b.dataset.k;rfields();});
  rfields();
  mountPicker('r_map',function(la,ln){
    document.getElementById('r_lat').value=la.toFixed(6);
    document.getElementById('r_lng').value=ln.toFixed(6);
    document.getElementById('r_geo').innerHTML='<span class="mono">'+(toMGRS(la,ln)||'')+'</span>';
  });
}
function numRow(id,label){return `<div class="between" style="padding:7px 0"><span>${label}</span>
  <input id="${id}" type="number" inputmode="numeric" style="width:90px;text-align:right" value="0"></div>`;}
function rfields(){
  const el=document.getElementById('rfields');
  if(RKIND==='recon'){
    el.innerHTML=`<div class="card">${numRow('r_troops','병력')}${numRow('r_trucks','트럭')}${numRow('r_vehicles','일반차량')}
      <label class="row" style="margin-top:9px;font-size:13px;padding-top:9px;border-top:1px dashed var(--line)">
        <input type="checkbox" id="r_hostile" style="width:18px;height:18px;flex:none"> 🔺 적 식별 (지도에 적색 마름모로 표시)</label></div>`;
  }else{
    el.innerHTML=`<div class="card">${numRow('r_armed','무장')}${numRow('r_unarmed','비무장')}
      <div class="lbl" style="margin:10px 0 6px">피해 판정</div>
      ${numRow('r_kia','사망')}${numRow('r_serious','중상')}${numRow('r_minor','경상')}
      <label class="row" style="margin-top:8px;font-size:13px"><input type="checkbox" id="r_failed" style="width:18px;height:18px"> 임무 실패</label></div>`;
  }
}
async function submitReport(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:null;};
  const body={team_id:SESS.team_id,kind:RKIND,mode:MODE,coord:g('r_coord')};
  const rla=g('r_lat'), rln=g('r_lng'); if(rla){body.lat=+rla;} if(rln){body.lng=+rln;}
  if(RKIND==='recon'){Object.assign(body,{troops:+g('r_troops'),trucks:+g('r_trucks'),vehicles:+g('r_vehicles'),hostile:document.getElementById('r_hostile').checked?1:0});}
  else{Object.assign(body,{armed:+g('r_armed'),unarmed:+g('r_unarmed'),kia:+g('r_kia'),serious:+g('r_serious'),minor:+g('r_minor'),failed:document.getElementById('r_failed').checked?1:0});}
  try{ await api('/reports','POST',body); toast('보고 전송됨'); renderReport(); }catch(e){ toast('전송 실패'); }
}

function renderFire(){
  const v=document.getElementById('view');
  v.innerHTML=`
    <h2>화력협조 요청</h2>
    <div class="card"><div class="lbl">요청 위치 (군사좌표)</div><input id="f_coord" class="mono" placeholder="WQ 0000 0000"></div>
    <div class="card"><div class="lbl">위치 — 지도를 눌러 지정</div>
      <div id="f_map" class="pickmap"></div>
      <div class="geo" id="f_geo">아직 지정 안 됨 (지도를 탭하세요)</div>
      <input type="hidden" id="f_lat"><input type="hidden" id="f_lng"></div>
    <div class="card"><div class="lbl">표적</div><input id="f_target" placeholder="예: 차량·병력"></div>

  mountPicker('f_map',function(la,ln){
    document.getElementById('f_lat').value=la.toFixed(6);
    document.getElementById('f_lng').value=ln.toFixed(6);
    document.getElementById('f_geo').innerHTML='<span class="mono">'+(toMGRS(la,ln)||'')+'</span>';

}
async function submitFire(){
  const g=id=>document.getElementById(id).value;
  const body={team_id:SESS.team_id,coord:g('f_coord'),target:g('f_target'),scale:g('f_scale'),support_from:FSUP,mode:MODE};

  try{ await api('/fire-requests','POST',body); toast('화력요청 전송됨'); }catch(e){ toast('전송 실패'); }

// ---- ALERTS ----
async function renderAlerts(){
  const v=document.getElementById('view'); v.innerHTML='<div class="muted">불러오는 중…</div>';
  try{
    const d=await api('/missions?team_id='+(SESS.team_id||''));
    const recent=(d.missions||[]).slice(0,8);
    v.innerHTML='<h2>알림</h2>'+(recent.length?recent.map(m=>`<div class="card between">
      <div class="row">${m.type==='attack'?'🔴':'🔵'} <span style="font-size:13px">${m.type==='attack'?'공격':'정찰'} 임무 · ${MSTAT[m.status]||m.status}</span></div>
      <span class="mono muted" style="font-size:11px">#${m.id}</span></div>`).join(''):'<div class="card muted">알림이 없습니다.</div>');
  }catch(e){ v.innerHTML=err(e); }
}

function err(e){return `<div class="warn">불러오기 실패: ${esc(e&&e.error||'네트워크 오류')}</div>`;}

// ---- restore session ----
(function(){
  const t=sessionStorage.getItem('iuccs_token');
  if(t){ TOKEN=t; try{SESS=JSON.parse(sessionStorage.getItem('iuccs_sess')||'{}')}catch(e){} MODE=SESS.mode||'real'; enterApp(); }
})();
